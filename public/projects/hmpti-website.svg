<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#2563EB" />
  
  <!-- Header -->
  <rect width="800" height="60" fill="#1E40AF" />
  
  <!-- Logo -->
  <circle cx="50" cy="30" r="20" fill="#FFFFFF" />
  <text x="85" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#FFFFFF">HMP TI UNESA</text>
  
  <!-- Navigation -->
  <rect x="300" y="20" width="80" height="20" rx="5" fill="#3B82F6" />
  <rect x="400" y="20" width="80" height="20" rx="5" fill="#3B82F6" />
  <rect x="500" y="20" width="80" height="20" rx="5" fill="#3B82F6" />
  <rect x="600" y="20" width="80" height="20" rx="5" fill="#3B82F6" />
  
  <!-- Hero Section -->
  <rect x="50" y="100" width="700" height="150" rx="10" fill="#1E40AF" />
  <text x="100" y="150" font-family="Arial" font-size="24" font-weight="bold" fill="#FFFFFF">Himpunan Mahasiswa Prodi</text>
  <text x="100" y="180" font-family="Arial" font-size="24" font-weight="bold" fill="#FFFFFF">Teknik Informatika UNESA</text>
  <text x="100" y="210" font-family="Arial" font-size="16" fill="#FFFFFF">Menjadi wadah pengembangan mahasiswa yang unggul</text>
  
  <!-- Content Sections -->
  <rect x="50" y="280" width="220" height="100" rx="5" fill="#3B82F6" />
  <rect x="290" y="280" width="220" height="100" rx="5" fill="#3B82F6" />
  <rect x="530" y="280" width="220" height="100" rx="5" fill="#3B82F6" />
  
  <!-- Section Icons -->
  <circle cx="80" cy="310" r="15" fill="#FFFFFF" />
  <circle cx="320" cy="310" r="15" fill="#FFFFFF" />
  <circle cx="560" cy="310" r="15" fill="#FFFFFF" />
  
  <!-- Section Titles -->
  <text x="110" y="310" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Visi & Misi</text>
  <text x="350" y="310" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Kegiatan</text>
  <text x="590" y="310" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Galeri</text>
</svg>